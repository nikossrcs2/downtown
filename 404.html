<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <title>404 — Downtown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #f5f5f7;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-faint: #d2d2d7;
      --btn-bg: #1d1d1f;
      --btn-text: #ffffff;
      --btn-hover: #2d2d2f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --page-bg: #000000;
        --text-primary: #f5f5f7;
        --text-secondary: #98989d;
        --text-faint: #38383a;
        --btn-bg: #f5f5f7;
        --btn-text: #1d1d1f;
        --btn-hover: #e8e8ec;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--page-bg); color: var(--text-primary);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 24px;
      transition: background 0.3s, color 0.3s;
    }
    .error-code { font-size: 6rem; font-weight: 700; letter-spacing: -0.04em; color: var(--text-faint); }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 8px 0 12px; }
    p { color: var(--text-secondary); margin-bottom: 28px; }
    a {
      display: inline-block; padding: 12px 28px; border-radius: 980px;
      background: var(--btn-bg); color: var(--btn-text); font-weight: 600; font-size: 0.9rem;
      text-decoration: none; transition: background 0.25s;
    }
    a:hover { background: var(--btn-hover); }
  </style>
</head>
<body>
  <div>
    <div class="error-code">404</div>
    <h1>Lost in the void.</h1>
    <p>This page doesn&rsquo;t exist — even the backrooms don&rsquo;t go here.</p>
    <a href="/">Back to Downtown</a>
  </div>
</body>
</html>
